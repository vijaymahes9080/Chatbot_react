<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Hexagon -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-linejoin="round" />
  <!-- Inner Hexagon -->
  <polygon points="50,20 78,36 78,64 50,80 22,64 22,36" fill="none" stroke="url(#glowGrad)" stroke-width="2" stroke-dasharray="4,2" opacity="0.6" />
  <!-- Core sphere -->
  <circle cx="50" cy="50" r="12" fill="url(#glowGrad)" filter="url(#glowFilter)" />
  <!-- Floating Orbit lines -->
  <path d="M 35,50 A 15,15 0 0,1 65,50" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8" stroke-linecap="round" />
</svg>
